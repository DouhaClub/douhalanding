<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#8f3d2e"/>
      <stop offset="100%" stop-color="#5c2418"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.35  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0.22 0" in="noise" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
    <pattern id="halftone" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="0.55" fill="#000" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)" filter="url(#grain)"/>
  <rect width="1920" height="1080" fill="url(#halftone)"/>
  <rect width="1920" height="1080" fill="#6b2a1f" opacity="0.12"/>
</svg>
